[profile.default]
src = "src"
out = "out"
libs = ["lib", "node_modules"]
solc = "0.8.24"
optimizer = true
optimizer_runs = 200
via_ir = false

remappings = [
  "@openzeppelin/=node_modules/@openzeppelin/contracts/",
  "@interfaces/=../solidity-interfaces/",
  "forge-std/=lib/forge-std/src/"
]

[fmt]
line_length = 120
